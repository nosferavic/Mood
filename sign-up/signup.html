<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="LOGO-ICO.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <script src="index.js" defer></script>
    <title>Mood - Cadastro</title>
</head>
<body>
    <div class="page-wrapper">
        <div class="logo-top">
            <img src="../imagens/MOOD-LGO.png" alt="Logo Mood">
        </div>

        <div class="signup-container">
            <div class="logo">Cadastre-se</div>
            <div class="subtitle">Compartilhe como você está se sentindo hoje!</div>

            <form>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                    <div class="error-message" id="emailError">Email inválido</div>
                </div>

                <div class="input-group">
                    <label>Nome completo</label>
                    <input type="text" id="name" placeholder="Seu nome" required>
                    <div class="error-message" id="nameError">Nome inválido</div>
                </div>

                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" id="user" placeholder="Usuário" required>
                    <div class="error-message" id="nameError">Usuário inválido</div>
                </div>

                <div class="input-group">
                    <label>Data de nascimento</label>
                    <input type="date" id="nascimento" name="nascimento" min="1900-01-01" max="2026-12-31" placeholder="01/01/2000" required>
                    <div class="error-message" id="emailError">Email inválido</div>
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>Confirme sua senha</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="••••••••" required>
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                </div>

                <button class="signup-btn" onclick="signupUser(event)">Cadastrar</button>
            </form>

            <div class="signup forgot">
                Já tem uma conta? <a href="../index.html">Entrar com conta</a>
            </div>
        </div>
    </div>
</body>
</html>
